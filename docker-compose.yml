services:
  postgres:
    image: postgres:16
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-signalledger}
      POSTGRES_USER: ${POSTGRES_USER:-signalledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signalledger}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-signalledger} -d ${POSTGRES_DB:-signalledger}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  nats:
    image: nats:2.10
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 1; done &&
      mc mb -p local/$${MINIO_BUCKET} || true
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-evidence}

  api:
    build:
      context: .
    command: ["pnpm", "--filter", "@signalledger/api", "dev"]
    expose:
      - "4315"
    environment:
      NODE_ENV: production
      APP_NAME: SignalLedger
      API_PORT: 4315
      WEB_PORT: 4316
      DATABASE_URL: postgres://${POSTGRES_USER:-signalledger}:${POSTGRES_PASSWORD:-signalledger}@postgres:5432/${POSTGRES_DB:-signalledger}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-change-me-in-development}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-evidence}
      SIGNALLEDGER_OUTBOX_INTERVAL_MS: ${SIGNALLEDGER_OUTBOX_INTERVAL_MS:-2000}
      WEB_ORIGIN: ${WEB_ORIGIN:-https://signalledger.frankai.online}
      API_ORIGIN: ${API_ORIGIN:-https://signalledger.frankai.online}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
    command: ["pnpm", "--filter", "@signalledger/worker", "dev"]
    environment:
      NODE_ENV: production
      APP_NAME: SignalLedger
      API_PORT: 4315
      WEB_PORT: 4316
      DATABASE_URL: postgres://${POSTGRES_USER:-signalledger}:${POSTGRES_PASSWORD:-signalledger}@postgres:5432/${POSTGRES_DB:-signalledger}
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-change-me-in-development}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-evidence}
      SIGNALLEDGER_OUTBOX_INTERVAL_MS: ${SIGNALLEDGER_OUTBOX_INTERVAL_MS:-2000}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://signalledger.frankai.online:4316}
      API_ORIGIN: ${API_ORIGIN:-http://signalledger.frankai.online:4315}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    environment:
      SIGNALLEDGER_SITE_ADDR: ${SIGNALLEDGER_SITE_ADDR:-signalledger.frankai.online}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@signalledger.frankai.online}
    depends_on:
      api:
        condition: service_started
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"

volumes:
  postgres_data:
  nats_data:
  minio_data:
